<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
      content="Philippe Ribeiro — Measurement-driven portfolio." />
    <title>Philippe Ribeiro</title>

    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
    <meta name="theme-color" content="#ffffff" />

    <script>
    // Resolve the appearance before first paint: an explicit choice wins,
    // otherwise the page follows the OS. Without this the light default would
    // flash before src/main.ts runs. (The `js` class that gates the reveal
    // animations is added by src/main.ts itself, NOT here: adding it before the
    // bundle runs would hide the pre-rendered content.)
    try {
      let saved = null;
      try {
        saved = localStorage.getItem("cv-theme");
      } catch {}
      if (saved !== "light" && saved !== "dark") {
        saved = matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      }
      document.documentElement.dataset.theme = saved;
    } catch {}
    </script>

    <style>
    /* Minimal base styles available instantly, before any JS/CSS loads.
       Mirrors the --bg/--fg anchors of src/styles.css so the loader and the
       real stylesheet agree and first paint never flashes. */
    :root {
      --loader-bg: #ffffff;
      --loader-fg: #1d1d1f;
      --loader-muted: #6e6e73;
    }
    :root[data-theme='dark'] {
      --loader-bg: #000000;
      --loader-fg: #f5f5f7;
      --loader-muted: #86868b;
    }
    html,
    body {
      background: var(--loader-bg);
      color: var(--loader-fg);
      margin: 0;
    }
    #app {
      min-height: 100vh;
      min-height: 100dvh;
    }
    </style>
    <!-- Loader-only styles: the SSG build strips this block (pre-rendered pages have no loader). -->
    <style data-loader>
    .loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: var(--loader-bg);
      color: var(--loader-fg);
      font-family: 'Noto Sans', system-ui, -apple-system, BlinkMacSystemFont,
        'Segoe UI', Roboto, sans-serif;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .loader__name {
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
      text-align: center;
    }
    .loader__status {
      font-size: 0.8125rem;
      color: var(--loader-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .loader__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--loader-muted);
      animation: loader-pulse 1.2s infinite ease-in-out;
    }
    .loader__dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .loader__dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes loader-pulse {
      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loader" id="loader">
        <div class="loader__name">Philippe Ribeiro</div>
        <div class="loader__status">
          <span>Loading</span>
          <span class="loader__dot" aria-hidden="true"></span>
          <span class="loader__dot" aria-hidden="true"></span>
          <span class="loader__dot" aria-hidden="true"></span>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
