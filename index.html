<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jorge Paula Pinheiro — Measurement-driven portfolio." />
    <title>Jorge Paula Pinheiro</title>

    <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />

    <script>
      // Mark JS as available (progressive enhancement) and apply the saved theme
      // before first paint. Without JS, the pre-rendered content stays visible.
      document.documentElement.classList.add('js');
      try {
        const saved = localStorage.getItem('cv-theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.dataset.theme = saved;
        }
      } catch {}
    </script>

    <style>
      /* Minimal loader styles available instantly, before any JS/CSS loads. */
      :root {
        --loader-bg: #0a0a0a;
        --loader-fg: #f2f2f2;
        --loader-muted: #737373;
        --loader-accent: #6366f1;
      }
      :root[data-theme='light'] {
        --loader-bg: #fafafa;
        --loader-fg: #0a0a0a;
        --loader-muted: #525252;
        --loader-accent: #4f46e5;
      }
      html,
      body {
        background: var(--loader-bg);
        color: var(--loader-fg);
        margin: 0;
      }
      #app {
        min-height: 100vh;
      }
      .loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: var(--loader-bg);
        color: var(--loader-fg);
        font-family: 'Noto Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      .loader--hidden {
        opacity: 0;
        visibility: hidden;
      }
      .loader__name {
        font-size: clamp(2rem, 8vw, 4rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 0.95;
        text-align: center;
      }
      .loader__status {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--loader-muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .loader__dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--loader-accent);
        animation: loader-pulse 1.2s infinite ease-in-out;
      }
      .loader__dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loader__dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes loader-pulse {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loader" id="loader">
        <div class="loader__name">JORGE<br />PAULA PINHEIRO</div>
        <div class="loader__status">
          <span>Loading</span>
          <span class="loader__dot" aria-hidden="true"></span>
          <span class="loader__dot" aria-hidden="true"></span>
          <span class="loader__dot" aria-hidden="true"></span>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
