# Type-check, lint, test and build on every pull request (deploy.yaml only runs on main).
name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Exact version (not a range) so CI runs are reproducible; bump deliberately.
          bun-version: "1.3.14"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Lint the dither engine (Rust)
        run: bun run check:rust

      - name: Build the dither engine (Rust → WASM)
        run: bun run wasm:build

      - name: Test
        run: bun test

      - name: Build (includes type check)
        run: bun run build
