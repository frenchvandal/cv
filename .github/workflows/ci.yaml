# Type-check, test and build on every pull request (deploy.yaml only runs on main).
name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build the dither engine (Rust → WASM)
        run: bun run wasm:build

      - name: Test
        run: bun test

      - name: Build (includes type check)
        run: bun run build
